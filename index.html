<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>🚀 ตะลุยอวกาศกับ สกร.กันตัง - 6-Rings Ultra Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        #webcam { transform: scaleX(-1); will-change: transform; opacity: 0.4; }
        .blur-bg { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 m-0 p-0 overflow-hidden select-none touch-none font-sans">

    <div id="login-box" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/85 blur-bg p-4 transition-all duration-500">
        <div class="bg-slate-900 border border-cyan-500/40 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center text-white">
            <div class="text-5xl mb-4 animate-bounce">🚀</div>
            <h2 class="text-2xl font-bold text-cyan-400 mb-2">ตะลุยอวกาศกับ สกร.กันตัง</h2>
            <p class="text-xs text-slate-400 mb-6">กรุณากรอกชื่อจริงเพื่อบันทึกทำเนียบนักบิน</p>
            <div class="mb-5">
                <input type="text" id="player-name" placeholder="ชื่อ - นามสกุลของคุณ" 
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition-all text-center font-medium">
            </div>
            <button id="btn-start-game" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-xl text-sm shadow-lg shadow-cyan-500/20 cursor-pointer transition-all">
                👨‍🚀 ยืนยันพิกัดเริ่มบิน
            </button>
        </div>
    </div>

    <video id="webcam" class="absolute w-full h-full object-cover z-10" autoplay playsinline muted></video>
    <div id="canvas3d" class="absolute w-full h-full z-20 pointer-events-none"></div>

    <div class="absolute top-4 left-4 z-30 bg-slate-900/90 backdrop-blur-md text-white p-5 rounded-xl border border-cyan-500/30 shadow-2xl max-w-sm">
        <h1 class="text-xl font-bold tracking-wide mb-1 text-cyan-400">🚀 ตะลุยอวกาศกับ สกร.กันตัง</h1>
        <p id="ui-pilot" class="text-xs text-emerald-400 mb-2 font-medium">นักบิน: กำลังโหลดข้อมูล...</p>
        <div class="space-y-2 text-sm border-t border-slate-700 pt-3">
            <div id="game-status" class="flex items-center gap-2">
                <span id="status-led" class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="status-text">ระบบนำทาง: ปกติ</span>
            </div>
            <div id="score" class="text-yellow-400 font-mono text-base">ชนกำแพงดาวเคราะห์: 0 ครั้ง</div>
            <button id="btn-send" class="w-full mt-2 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-medium py-2 px-4 rounded-lg text-xs shadow-md cursor-pointer transition-all">📤 ส่งข้อมูลเข้า Google Sheets</button>
        </div>
    </div>

    <script>
        // 🚨 นำลิงก์ Web App URL ตัวล่าสุดที่ได้จากการ Deploy ข้อความด้านบนมาวางตรงนี้ครับ
        const GAS_WEB_APP_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnSv7tGZPkg4DNKFxy2lS06fCNjXExjftau484zrCc3UBv3BKlX1XqLU87HAyEgbFM0L19IXd3nZUKIddQh011h02MQeK3x0WMxy0vjcvGCzKY5kUHaVPHwiGoONzLMVBVMl3elPHJDDXBjPdDOqZdf_IO4TB4spyZuiadzL0Bq4gPOKveifsccFS6VunTNwHNAxZOoiouro8i1YiT_jTROD_fMByTQLq5kw3Gd3ZSj9HiYZGtEfLB1AnrKmfbueSMM3odrGhhZ-X7BZ3bnPgpNkoHrjlQ&lib=MHUWWaTVISMkhxh13cAvf-0buytW488xe";

        let pilotName = "";
        
        document.getElementById('btn-start-game').addEventListener('click', () => {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") { alert("❌ ต้องใส่ชื่อ-นามสกุลก่อนนะคร้าบ!"); return; }
            pilotName = inputName;
            document.getElementById('ui-pilot').innerText = `👨‍✈️ นักบิน: ${pilotName}`;
            document.getElementById('login-box').classList.add('opacity-0', 'pointer-events-none');
            initGame();
        });

        function initGame() {
            const videoElement = document.getElementById('webcam');
            const statusText = document.getElementById('status-text');
            const statusLed = document.getElementById('status-led');
            const scoreDiv = document.getElementById('score');
            const btnSend = document.getElementById('btn-send');
            
            let touchCount = 0, audioCtx = null, isTouching = false;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas3d').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(3, 5, 4);
            scene.add(dirLight);

            const mazeGroup = new THREE.Group();
            const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x38bdf8, side: THREE.DoubleSide, roughness: 0.4 });

            // --- 🛠️ ขยายเขาวงกตเพิ่มวงแหวนเป็น 6 ชั้น พร้อมเจาะรูสลับทิศทางเพื่อให้ลัดเลาะยากขึ้น ---
            const ring1 = new THREE.RingGeometry(0.74, 0.84, 64, 1, 1.9, Math.PI * 2 - 0.7); // วงที่ 1 ช่องว่างบน
            const ring2 = new THREE.RingGeometry(1.34, 1.44, 64, 1, -0.4, Math.PI * 2 - 0.7); // วงที่ 2 ช่องว่างล่างขวา
            const ring3 = new THREE.RingGeometry(1.94, 2.04, 64, 1, 1.2, Math.PI * 2 - 0.7); // วงที่ 3 ช่องว่างขวาบน
            const ring4 = new THREE.RingGeometry(2.54, 2.64, 64, 1, 3.2, Math.PI * 2 - 0.8); // วงที่ 4 ช่องว่างซ้ายกลาง
            const ring5 = new THREE.RingGeometry(3.14, 3.24, 64, 1, 0.0, Math.PI * 2 - 0.7); // วงที่ 5 ช่องว่างขวากลาง
            const ring6 = new THREE.RingGeometry(3.74, 3.84, 64, 1, 1.0, Math.PI * 2 - 0.6); // วงที่ 6 วงนอกสุดเจาะรูพุ่งไปหาเส้นชัย

            mazeGroup.add(new THREE.Mesh(ring1, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring2, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring3, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring4, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring5, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring6, ringMaterial));

            // --- 🛠️ เพิ่ม "ลูกอุกกาบาตสิ่งกีดขวางสีแดงส้ม" ดักระหว่างช่องว่างแต่ละชั้นตามโจทย์ ---
            const obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xea580c, emissive: 0x451a03, roughness: 0.5 });
            const obsGeometry = new THREE.SphereGeometry(0.12, 16, 16);
            
            const obstacles = [
                new THREE.Mesh(obsGeometry, obstacleMaterial),
                new THREE.Mesh(obsGeometry, obstacleMaterial),
                new THREE.Mesh(obsGeometry, obstacleMaterial),
                new THREE.Mesh(obsGeometry, obstacleMaterial)
            ];

            // วางพิกัดพุ่งชนดักไว้ระหว่างชั้น
            obstacles[0].position.set(0, 1.1, 0);   // ดักรูชั้น 1 กับ 2
            obstacles[1].position.set(1.5, -0.8, 0); // ดักระหว่างชั้น 2 กับ 3
            obstacles[2].position.set(-2.2, 0.5, 0); // ดักระหว่างชั้น 3 กับ 4
            obstacles[3].position.set(2.8, 1.6, 0);  // ดักหน้าทางออกวงรอบนอกสุด
            
            obstacles.forEach(obs => mazeGroup.add(obs));
            mazeGroup.position.set(0, 0, -5);
            scene.add(mazeGroup);

            // ป้ายแสดงทิศทางตัวใหญ่สะใจ
            createMarker("👨‍🚀 START", 0, -0.3, "#10b981");
            createMarker("🚀 FINISH", 4.4, 2.5, "#f59e0b");

            function createMarker(text, x, y, hexColorStr) {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
                ctx.beginPath(); ctx.roundRect(10, 10, 492, 108, 20); ctx.fill();
                ctx.fillStyle = hexColorStr; ctx.font = 'Bold 52px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 256, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                const geom = new THREE.PlaneGeometry(2.0, 0.5);
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(x, y, -4.8);
                scene.add(mesh);
            }

            // โมเดลยานอวกาศ 3D บินตามนิ้วชี้
            const spaceshipGroup = new THREE.Group();
            const bodyGeo = new THREE.ConeGeometry(0.14, 0.42, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.3, metalness: 0.5 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.rotation.z = -Math.PI / 2;
            spaceshipGroup.add(bodyMesh);

            const wingMat = new THREE.MeshStandardMaterial({ color: 0xf43f5e, metalness: 0.6 });
            const leftWing = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.08), wingMat);
            leftWing.position.set(-0.08, 0, 0.1);
            const rightWing = leftWing.clone();
            rightWing.position.set(-0.08, 0, -0.1);
            spaceshipGroup.add(leftWing); spaceshipGroup.add(rightWing);

            spaceshipGroup.position.set(0, 0, -5);
            scene.add(spaceshipGroup);

            function playSpaceSiren() {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } catch(e) { console.log(e); }
            }

            // --- 🛠️ ปรับปรุงพิกัดการชน 6 ชั้น และตรวจจับการพุ่งชนลูกไฟสิ่งกีดขวางเพิ่มความแม่นยำทางกายภาพ ---
            function checkCollision() {
                let hit = false;
                const pX = spaceshipGroup.position.x;
                const pY = spaceshipGroup.position.y;
                const dist = Math.sqrt(pX * pX + pY * pY);

                // เช็กขอบวงแหวนทั้ง 6 ชั้น สกัดจุดเปิดตรงตาเห็น
                if (dist > 0.65 && dist < 0.93) { if (pY < 0.5) hit = true; } // ชั้น 1
                else if (dist > 1.25 && dist < 1.53) { if (!(pX > 0.8 && pY < -0.5)) hit = true; } // ชั้น 2
                else if (dist > 1.85 && dist < 2.13) { if (!(pX > 1.0 && pY > 0.8)) hit = true; } // ชั้น 3
                else if (dist > 2.45 && dist < 2.73) { if (!(pX < -1.2)) hit = true; } // ชั้น 4
                else if (dist > 3.05 && dist < 3.33) { if (!(pX > 1.8 && Math.abs(pY) < 0.8)) hit = true; } // ชั้น 5
                else if (dist > 3.65 && dist < 3.93) { if (!(pX > 1.8 && pY > 1.8)) hit = true; } // ชั้น 6 (วงนอกสุด)

                // เช็กปะทะกับลูกอุกกาบาตสิ่งกีดขวางสีส้มดักรู (คำนวณระยะห่างทางกายภาพจริง 3D)
                obstacles.forEach(obs => {
                    let obsWorldPos = new THREE.Vector3();
                    obs.getWorldPosition(obsWorldPos);
                    let distToObs = spaceshipGroup.position.distanceTo(obsWorldPos);
                    if (distToObs < 0.36) { hit = true; } // ระยะประชิดอุกกาบาต
                });

                if (hit) {
                    if (!isTouching) {
                        isTouching = true; touchCount++;
                        scoreDiv.innerText = `ชนกำแพงดาวเคราะห์: ${touchCount} ครั้ง`;
                        statusText.innerHTML = `🚨 ยานชนสิ่งกีดขวางอวกาศ!`;
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-rose-500 animate-ping";
                        bodyMat.color.setHex(0xff3333); playSpaceSiren();
                    }
                } else {
                    if (isTouching) {
                        isTouching = false;
                        statusText.innerText = "ระบบนำทาง: ปกติ";
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                        bodyMat.color.setHex(0xf8fafc);
                    }
                }
            }

            // --- 🛠️ ฟังก์ชันยิงพิกัดชื่อและคะแนน เข้าสู่แผ่น Sheet แบคเอนด์พร้อมกัน ---
            btnSend.addEventListener('click', () => {
                btnSend.innerText = "⏳ บันทึกทำเนียบความเร็วสูง..."; btnSend.disabled = true;
                
                fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        name: pilotName,
                        score: touchCount, 
                        status: "พิชิตมหาด่านเขาวงกต 6 ชั้นสำเร็จ" 
                    })
                }).then(() => {
                    btnSend.innerText = "📤 บันทึกสถิติมือลงสเปรตชีตสำเร็จ!";
                    btnSend.className = "w-full mt-2 bg-emerald-600 text-white font-medium py-2 px-4 rounded-lg text-xs shadow-md";
                    setTimeout(() => { 
                        btnSend.innerText = "📤 ส่งข้อมูลเข้า Google Sheets"; 
                        btnSend.disabled = false; 
                        btnSend.className = "w-full mt-2 bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2 px-4 rounded-lg text-xs shadow-md cursor-pointer";
                    }, 3000);
                }).catch(err => { alert("ระลอกเชื่อมต่อล้มเหลว"); btnSend.disabled = false; });
            });

            function onResults(results) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const indexTip = results.multiHandLandmarks[0][8];
                    let targetX = -(indexTip.x - 0.5) * 9.5; // ขยายขนาดล้อพิกัดมือเต็มจอ 6 ชั้น
                    let targetY = -(indexTip.y - 0.5) * 6.8;

                    let diffX = targetX - spaceshipGroup.position.x;
                    let diffY = targetY - spaceshipGroup.position.y;
                    spaceshipGroup.rotation.z = Math.atan2(diffY, diffX);

                    spaceshipGroup.position.x += (targetX - spaceshipGroup.position.x) * 0.32;
                    spaceshipGroup.position.y += (targetY - spaceshipGroup.position.y) * 0.32;
                    checkCollision();
                }
                renderer.render(scene, camera);
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
            cameraUtils.start();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
