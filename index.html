<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>🚀 ตะลุยอวกาศ กับ สกร.กันตัง - Spaceship & Login Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        #webcam { transform: scaleX(-1); will-change: transform; opacity: 0.4; }
        .blur-bg { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 m-0 p-0 overflow-hidden select-none touch-none font-sans">

    <div id="login-box" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 blur-bg p-4 transition-all duration-500">
        <div class="bg-slate-900 border border-cyan-500/40 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center text-white">
            <div class="text-5xl mb-4 animate-bounce">🚀</div>
            <h2 class="text-2xl font-bold text-cyan-400 mb-2">Space Maze AR</h2>
            <p class="text-xs text-slate-400 mb-6">กรุณากรอกชื่อของคุณเพื่อลงทะเบียนนักบินอวกาศ</p>
            <div class="mb-5">
                <input type="text" id="player-name" placeholder="ชื่อ - นามสกุลของคุณ" 
                       class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition-all text-center font-medium">
            </div>
            <button id="btn-start-game" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 px-4 rounded-xl text-sm shadow-lg shadow-cyan-500/20 cursor-pointer transition-all">
                🚀 เริ่มการสำรวจอวกาศ
            </button>
        </div>
    </div>

    <video id="webcam" class="absolute w-full h-full object-cover z-10" autoplay playsinline muted></video>
    <div id="canvas3d" class="absolute w-full h-full z-20 pointer-events-none"></div>

    <div class="absolute top-4 left-4 z-30 bg-slate-900/90 backdrop-blur-md text-white p-5 rounded-xl border border-cyan-500/30 shadow-2xl max-w-sm">
        <h1 class="text-xl font-bold tracking-wide mb-1 text-cyan-400">🚀 Space Maze AR</h1>
        <p id="ui-pilot" class="text-xs text-emerald-400 mb-2 font-medium">นักบิน: กำลังโหลด...</p>
        <div class="space-y-2 text-sm border-t border-slate-700 pt-3">
            <div id="game-status" class="flex items-center gap-2">
                <span id="status-led" class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="status-text">ระบบนำทาง: ปกติ</span>
            </div>
            <div id="score" class="text-yellow-400 font-mono text-base">ชนกำแพงดาวเคราะห์: 0 ครั้ง</div>
            <button id="btn-send" class="w-full mt-2 bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2 px-4 rounded-lg text-xs shadow-md cursor-pointer transition-all">📤 บันทึกสถิติลง Google Sheets</button>
        </div>
    </div>

    <script>
        // 🚨 นำลิงก์ Web App URL จาก Google Apps Script ของพี่มาวางแทนข้อความตรงนี้ครับ
        const GAS_WEB_APP_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTALDR1paUYgTFDwWhdvCOu7c1zYBxU_-9d1a9cF5dX7z75dcqMPocdaU-EONO45IqZzk5m1VjVE3I4WBF_w7K1k8S67QbD5etWK27hEMjcNEw-GrY6OAk0prQHEUKTaX5nz6gK3Vr_XynuOUi4O49aoVGcHdfenNJ1p0DsCWgxYOP3jS499uzcaVxLrgoy1db3E-wzPeEwsSjk9DNwdQy-Aa0aqYwKn561Z4baDeveclbKzYixF6_mm1PRyjlSlc-lq5Bki7rcjCMJuS2XFZcaMiapEA&lib=MHUWWaTVISMkhxh13cAvf-0buytW488xe";

        let pilotName = "";
        
        // บังคับให้กรอกชื่อก่อนเริ่มต้นระบบกล้องและเกม
        document.getElementById('btn-start-game').addEventListener('click', () => {
            const inputName = document.getElementById('player-name').value.trim();
            if(inputName === "") {
                alert("❌ กรุณากรอกชื่อ-นามสกุลก่อนเข้าเล่นครับพี่!");
                return;
            }
            pilotName = inputName;
            document.getElementById('ui-pilot').innerText = `👨‍✈️ นักบิน: ${pilotName}`;
            document.getElementById('login-box').classList.add('opacity-0', 'pointer-events-none');
            initGame();
        });

        function initGame() {
            const videoElement = document.getElementById('webcam');
            const statusText = document.getElementById('status-text');
            const statusLed = document.getElementById('status-led');
            const scoreDiv = document.getElementById('score');
            const btnSend = document.getElementById('btn-send');
            
            let touchCount = 0, audioCtx = null, isTouching = false;

            // Setup ฉาก 3D
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas3d').appendChild(renderer.domElement);

            // แสงสว่างหลัก
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const mazeGroup = new THREE.Group();
            const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x38bdf8, side: THREE.DoubleSide, roughness: 0.4 });

            // วาดเขาวงกตวงกลม 3 ชั้นเจาะช่องแบบดั้งเดิมตามภาพ
            const ring1 = new THREE.RingGeometry(1.14, 1.26, 64, 1, 1.9, Math.PI * 2 - 0.7);
            const ring2 = new THREE.RingGeometry(2.14, 2.26, 64, 1, -0.4, Math.PI * 2 - 0.7);
            const ring3 = new THREE.RingGeometry(3.14, 3.26, 64, 1, 1.2, Math.PI * 2 - 0.7);

            mazeGroup.add(new THREE.Mesh(ring1, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring2, ringMaterial));
            mazeGroup.add(new THREE.Mesh(ring3, ringMaterial));

            // เพิ่มกำแพงขวางสไตล์เขาวงกต
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x38bdf8, roughness: 0.4 });
            const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.12, 0.1), wallMaterial);
            wallLeft.position.set(-1.7, 0, 0);
            const wallBottom = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.8, 0.1), wallMaterial);
            wallBottom.position.set(0, -1.7, 0);
            
            mazeGroup.add(wallLeft);
            mazeGroup.add(wallBottom);
            mazeGroup.position.set(0, 0, -5);
            scene.add(mazeGroup);

            // ขยายป้ายมาร์กเกอร์ START / FINISH ตัวใหญ่เบิ้ม
            createMarker("👨‍🚀 START", 0, -0.4, "#10b981");
            createMarker("🚀 FINISH", 4.3, 2.2, "#f59e0b");

            function createMarker(text, x, y, hexColorStr) {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
                ctx.beginPath(); ctx.roundRect(10, 10, 492, 108, 20); ctx.fill();
                ctx.fillStyle = hexColorStr; ctx.font = 'Bold 52px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 256, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                const geom = new THREE.PlaneGeometry(2.2, 0.55);
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(x, y, -4.8);
                scene.add(mesh);
            }

            // --- 🛠️ ส่วนที่อัปเดต: เปลี่ยนเป้าชมพูเป็น "โมเดลยานอวกาศฟิวเจอร์ 3D" ---
            const spaceshipGroup = new THREE.Group();
            
            // 1. ตัวยานหลัก (Cone รูปร่างกรวยคว่ำสีขาวสว่าง)
            const bodyGeo = new THREE.ConeGeometry(0.15, 0.45, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.3, metalness: 0.5 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.rotation.z = -Math.PI / 2; // หมุนหัวยานชี้ไปด้านข้างตามทิศทางวิ่ง
            spaceshipGroup.add(bodyMesh);

            // 2. ปีกยานด้านซ้ายและขวา (Box สีแดงเรืองแสง)
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xf43f5e, metalness: 0.6 });
            const leftWing = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.22, 0.08), wingMat);
            leftWing.position.set(-0.08, 0, 0.12);
            const rightWing = leftWing.clone();
            rightWing.position.set(-0.08, 0, -0.12);
            spaceshipGroup.add(leftWing);
            spaceshipGroup.add(rightWing);

            // 3. ท่อไอพ่นท้ายยาน (Cylinder สีเหลืองส้ม)
            const boosterGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.08, 8);
            const boosterMat = new THREE.MeshBasicMaterial({ color: 0xf97316 });
            const boosterMesh = new THREE.Mesh(boosterGeo, boosterMat);
            boosterMesh.position.set(-0.24, 0, 0);
            boosterMesh.rotation.z = Math.PI / 2;
            spaceshipGroup.add(boosterMesh);

            spaceshipGroup.position.set(0, 0, -5);
            scene.add(spaceshipGroup);

            function playSpaceSiren() {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } catch(e) { console.log(e); }
            }

            // ตรวจจับกล่องกระทบชนขอบวงแหวน
            function checkCollision() {
                let hit = false;
                const pX = spaceshipGroup.position.x;
                const pY = spaceshipGroup.position.y;
                const dist = Math.sqrt(pX * pX + pY * pY);

                if (dist > 1.05 && dist < 1.35) {
                    if (pY < 0.9) hit = true; 
                }
                else if (dist > 2.05 && dist < 2.35) {
                    if (!(pX > 1.2 && pY < -1.0)) hit = true;
                }
                else if (dist > 3.05 && dist < 3.35) {
                    if (!(pX > 1.8 && pY > 1.8)) hit = true;
                }

                let wLeftDistX = Math.abs(pX - (-1.7)), wLeftDistY = Math.abs(pY - 0);
                if (wLeftDistX < 0.45 && wLeftDistY < 0.22) hit = true;
                
                let wBotDistX = Math.abs(pX - 0), wBotDistY = Math.abs(pY - (-1.7));
                if (wBotDistX < 0.22 && wBotDistY < 0.45) hit = true;

                if (hit) {
                    if (!isTouching) {
                        isTouching = true; touchCount++;
                        scoreDiv.innerText = `ชนกำแพงดาวเคราะห์: ${touchCount} ครั้ง`;
                        statusText.innerHTML = `🚨 ยานชนสิ่งกีดขวาง!`;
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-rose-500 animate-ping";
                        bodyMat.color.setHex(0xff3333); playSpaceSiren();
                    }
                } else {
                    if (isTouching) {
                        isTouching = false;
                        statusText.innerText = "ระบบนำทาง: ปกติ";
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                        bodyMat.color.setHex(0xf8fafc);
                    }
                }
            }

            // --- 🛠️ ส่วนที่อัปเดต: ส่งค่าทั่ง Score และ ชื่อนักบิน ไปยัง Google Sheets ---
            btnSend.addEventListener('click', () => {
                btnSend.innerText = "⏳ บันทึกสถิตินักบิน..."; btnSend.disabled = true;
                fetch(GAS_WEB_APP_URL, {
                    method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        name: pilotName,
                        score: touchCount, 
                        status: "ฝ่าวงกตสำเร็จ" 
                    })
                }).then(() => {
                    btnSend.innerText = "📤 บันทึกคะแนนสำเร็จ!";
                    setTimeout(() => { btnSend.innerText = "📤 บันทึกสถิติลง Google Sheets"; btnSend.disabled = false; }, 2500);
                }).catch(err => { alert("การเชื่อมต่อขัดข้อง"); btnSend.disabled = false; });
            });

            function onResults(results) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const indexTip = results.multiHandLandmarks[0][8];
                    
                    let targetX = -(indexTip.x - 0.5) * 9.2;
                    let targetY = -(indexTip.y - 0.5) * 6.5;

                    // คำนวณมุมเล็งหัวยานให้หันไปตามทิศทางที่นิ้วกำลังลากไปข้างหน้าอย่างสมจริง
                    let diffX = targetX - spaceshipGroup.position.x;
                    let diffY = targetY - spaceshipGroup.position.y;
                    let angle = Math.atan2(diffY, diffX);
                    spaceshipGroup.rotation.z = angle;

                    spaceshipGroup.position.x += (targetX - spaceshipGroup.position.x) * 0.32;
                    spaceshipGroup.position.y += (targetY - spaceshipGroup.position.y) * 0.32;
                    
                    checkCollision();
                }
                renderer.render(scene, camera);
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
            cameraUtils.start();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
