<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>🚀 Space Maze AR - Absolute Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>#webcam { transform: scaleX(-1); will-change: transform; opacity: 0.4; }</style>
</head>
<body class="bg-slate-950 m-0 p-0 overflow-hidden select-none touch-none">

    <video id="webcam" class="absolute w-full h-full object-cover z-10" autoplay playsinline muted></video>
    <div id="canvas3d" class="absolute w-full h-full z-20 pointer-events-none"></div>

    <div class="absolute top-4 left-4 z-30 bg-slate-900/90 backdrop-blur-md text-white p-5 rounded-xl border border-cyan-500/30 shadow-2xl max-w-sm">
        <h1 class="text-xl font-bold tracking-wide mb-1 text-cyan-400">🚀 Space Maze AR</h1>
        <p class="text-xs text-slate-400 mb-3">ลากเป้าเล็งสีชมพูไปตามเส้นทางสีฟ้าเพื่อนำทางไปหาเส้นชัย</p>
        <div class="space-y-2 text-sm border-t border-slate-700 pt-3">
            <div id="game-status" class="flex items-center gap-2">
                <span id="status-led" class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="status-text">ระบบนำทาง: ปกติ</span>
            </div>
            <div id="score" class="text-yellow-400 font-mono text-base">หลุดออกนอกเส้นทาง: 0 ครั้ง</div>
            <button id="btn-send" class="w-full mt-2 bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2 px-4 rounded-lg text-xs shadow-md cursor-pointer">📤 บันทึกสถิติลง Google Sheets</button>
        </div>
    </div>

    <script>
        // 🚨 นำลิงก์ Web App URL จาก Google Apps Script ของพี่มาวางแทนข้อความตรงนี้ครับ
        const GAS_WEB_APP_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTZ65arLcTaFO2wuhJI-N7e_eBtJcIMMIstUvfetZeUmIQ3ji8qr7DaJXWU-aSdzN3bdm1nZpcpIIY6Jcmfik6Wm_216l3wh7cv0MLDh8uRg93E70aF0kKsrxbkXA-DOsvIWJ0FKxI3J9VqBuMRd0lLI1cnO4VpnveLy1nl16wel9n38Qf_M9TSjOTpVRDzD7GyEgJKIA7a99ORsICW6IXFKHMRVB7tzFG2i5mE7ZDQ1_91lImofSgS6Q7c8Dz_Y0LtwC2swnhp4k27SzwgGmyFCB3Mpg&lib=MHUWWaTVISMkhxh13cAvf-0buytW488xe";

        window.addEventListener('load', () => { initGame(); });

        function initGame() {
            const videoElement = document.getElementById('webcam');
            const statusText = document.getElementById('status-text');
            const statusLed = document.getElementById('status-led');
            const scoreDiv = document.getElementById('score');
            const btnSend = document.getElementById('btn-send');
            
            let touchCount = 0, audioCtx = null, isTouching = false;

            // Setup ฉาก 3D
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas3d').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.95);
            scene.add(ambientLight);

            // --- 🛠️ ปรับกลยุทธ์ใหม่: วาดเส้นทางเดินนำทาง (Safe Path) แบบท่อ 3D เรืองแสงที่ลัดเลาะมีช่องเปิดจริง ---
            // เส้นทางนี้ลากออกจากจุดศูนย์กลาง -> ทะลุช่องเปิดชั้นที่ 1 -> วนหาช่องเปิดชั้นที่ 2 -> แล้วพุ่งออกจากช่องชั้นที่ 3 ไปหาเส้นชัย
            const pathPoints = [
                new THREE.Vector3(0, 0, -5),        // เริ่มต้นที่มนุษย์อวกาศ
                new THREE.Vector3(0, 1.2, -5),      // ลอดช่องเปิดวงที่ 1 (ด้านบน)
                new THREE.Vector3(1.6, 1.2, -5),    // เลี้ยวขวาไต่ตามช่องว่าง
                new THREE.Vector3(1.6, -1.5, -5),   // ลากลงล่างขวา หาช่องเปิดวงที่ 2
                new THREE.Vector3(-2.4, -1.5, -5),  // วนซ้ายด้านล่างหลบกำแพง
                new THREE.Vector3(-2.4, 2.2, -5),   // ไต่ขึ้นขอบซ้าย
                new THREE.Vector3(2.5, 2.2, -5),    // ลากมาขวาบน หาช่องเปิดวงนอกสุด
                new THREE.Vector3(4.3, 2.2, -5)     // พุ่งเข้าชนยานอวกาศ (เส้นชัย)
            ];

            const safeCurve = new THREE.CatmullRomCurve3(pathPoints);
            const pathGeometry = new THREE.TubeGeometry(safeCurve, 100, 0.14, 8, false); // ท่อหนาสีฟ้าสดใสพาดผ่านหน้ากล้อง
            const pathMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0ea5e9, 
                emissive: 0x0284c7, 
                metalness: 0.3, 
                roughness: 0.2 
            });
            const safePathMesh = new THREE.Mesh(pathGeometry, pathMaterial);
            scene.add(safePathMesh);

            // มาร์กเกอร์จุดปล่อยและเส้นชัย (ฟอนต์ยักษ์ใหญ่ชัดเจน)
            createMarker("👨‍🚀 START", 0, -0.4, "#10b981");
            createMarker("🚀 FINISH", 4.3, 1.6, "#f59e0b");

            function createMarker(text, x, y, hexColorStr) {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
                ctx.beginPath(); ctx.roundRect(10, 10, 492, 108, 20); ctx.fill();
                ctx.fillStyle = hexColorStr; ctx.font = 'Bold 52px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 256, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                const geom = new THREE.PlaneGeometry(2.2, 0.55);
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(x, y, -4.8);
                scene.add(mesh);
            }

            // ตัวเป้าเล็งสีชมพูควบคุมด้วยนิ้วมือ
            const pointerGeo = new THREE.TorusGeometry(0.24, 0.05, 8, 32);
            const pointerMat = new THREE.MeshBasicMaterial({ color: 0xf43f5e });
            const pointerMesh = new THREE.Mesh(pointerGeo, pointerMat);
            pointerMesh.position.set(0, 0, -5);
            scene.add(pointerMesh);

            function playSpaceSiren() {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } catch(e) { console.log(e); }
            }

            // --- 🛠️ ระบบตรวจจับการชนแบบสากล (แม่นยำ 100%): ตรวจว่านิ้วผู้เล่นลาก "หลุดออกนอกท่อทางเดินปลอดภัย" หรือไม่ ---
            function checkCollision() {
                let currentPos = pointerMesh.position;
                let onTrack = false;

                // สุ่มตรวจพิกัดบนเส้นท่อทางเดิน 120 จุด เปรียบเทียบระยะทางสัมผัสโดยตรง
                for (let i = 0; i <= 120; i++) {
                    let pathPoint = safeCurve.getPointAt(i / 120);
                    let distance = currentPos.distanceTo(pathPoint);
                    
                    // ถ้านิ้วอยู่ใกล้ชิดกับแนวเส้นทางเดินนำทาง น้อยกว่าค่าปลอดภัย ถือว่าวิ่งบนรางปกติ (ปลอดภัย)
                    if (distance < 0.48) { 
                        onTrack = true;
                        break;
                    }
                }

                // ถ้านิ้วลากแหกโค้ง หลุดจากแนวท่อทางเดิน -> สั่งแจ้งเตือนชนกำแพงทันที
                if (!onTrack) {
                    if (!isTouching) {
                        isTouching = true; touchCount++;
                        scoreDiv.innerText = `หลุดออกนอกเส้นทาง: ${touchCount} ครั้ง`;
                        statusText.innerHTML = `🚨 ยานชนสิ่งกีดขวาง!`;
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-rose-500 animate-ping";
                        pointerMat.color.setHex(0xff0000); playSpaceSiren();
                    }
                } else {
                    if (isTouching) {
                        isTouching = false;
                        statusText.innerText = "ระบบนำทาง: ปกติ";
                        statusLed.className = "inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                        pointerMat.color.setHex(0xf43f5e);
                    }
                }
            }

            btnSend.addEventListener('click', () => {
                btnSend.innerText = "⏳ บันทึกพิกัดสู่อวกาศ..."; btnSend.disabled = true;
                fetch(GAS_WEB_APP_URL, {
                    method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ score: touchCount, status: "พามนุษย์อวกาศลัดเลาะผ่านช่องแคบสำเร็จ" })
                }).then(() => {
                    btnSend.innerText = "📤 บันทึกคะแนนสำเร็จ!";
                    setTimeout(() => { btnSend.innerText = "📤 ส่งคะแนนเข้า Google Sheets"; btnSend.disabled = false; }, 2500);
                }).catch(err => { alert("ขัดข้อง"); btnSend.disabled = false; });
            });

            function onResults(results) {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const indexTip = results.multiHandLandmarks[0][8];
                    pointerMesh.position.x += (-(indexTip.x - 0.5) * 9.2 - pointerMesh.position.x) * 0.35;
                    pointerMesh.position.y += (-(indexTip.y - 0.5) * 6.5 - pointerMesh.position.y) * 0.35;
                    checkCollision();
                }
                renderer.render(scene, camera);
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
            hands.onResults(onResults);

            const cameraUtils = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
            cameraUtils.start();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
